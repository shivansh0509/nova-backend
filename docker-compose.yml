# ─── NOVA Backend — Development Docker Compose ──────────────────────────────
# For local development only. Use root docker-compose.yml for production.
# Usage: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: nova_postgres_dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nova
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nova"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nova_dev_network

  redis:
    image: redis:7-alpine
    container_name: nova_redis_dev
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nova_dev_network

volumes:
  postgres_dev_data:
  redis_dev_data:

networks:
  nova_dev_network:
    driver: bridge
